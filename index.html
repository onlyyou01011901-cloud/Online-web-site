    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.03);
            --blue-glow: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a1a2e, #0a0a0b);
            min-height: 100vh;
        }

        /* --- BAŞLIK VE GİRİŞ --- */
        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 15px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: tracking-in-expand 3.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        .sub-logo {
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--gold);
            margin-top: 10px;
            opacity: 0.8;
        }

        /* --- ÜRÜN IZGARASI --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (min-width: 992px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* --- ÜRÜN KARTI (EFSANE STİL) --- */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 20px;
            cursor: zoom-in;
            transition: 0.5s;
        }

        .card:hover img {
            filter: brightness(1.1);
        }

        .info {
            padding: 15px 5px;
            text-align: center;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* --- BUTONLAR --- */
        .btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .imo-btn {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 200% 200%;
            animation: gradientMove 5s infinite;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .pay-btn {
            background: transparent;
            color: #555;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* --- SEPET (FLOATING) --- */
        .efsane-sebet {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
        }

        .efsane-sebet:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* --- ZOOM MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal img {
            max-width: 95%;
            max-height: 85vh;
            border-radius: 15px;
            border: 2px solid var(--gold);
        }

        /* --- ANİMASYONLAR --- */
        @keyframes tracking-in-expand {
            0% {
                letter-spacing: -0.5em;
                opacity: 0;
            }

            40% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .back-to-top {
            position: fixed;
            bottom: 110px;
            /* Sepet butonunun üstünde durması için */
            right: 30px;
            background: var(--glass);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            /* Başta gizli */
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 999;
            transition: 0.3s;
        }

        .back-to-top:hover {
            background: var(--gold);
            color: white;
        }
    </style>
</head>
